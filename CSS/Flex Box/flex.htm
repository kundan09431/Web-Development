<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex </title>
    <style>
        .flex-container{
            display: flex;
            flex-direction: row-reverse;
            background-color: dodgerblue;
        }
        .flex-container > div{
            background-color: #f1f1f1;
            padding: 16px;
            width: 100px;
            text-align: center;
            line-height: 75px;
            margin: 10px;
            font-size: 30px;
        }
        .flex-container > div:hover{
            background-color: aqua;
            color: white;
            padding: 20px;

        }
    </style>
</head>
<body>
    <h1>Create a Flex Container</h1>
    <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
