<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block</title>
    <style>
        a{
            display: block;
        }
        span{
            display: block;
        }
    </style>
</head>
<body>
    <h1>Display links as block elements</h1>
    <a href="#">HTML</a>
    <a href="#">CSS</a>
    <a href="#">JavaScript</a>
<br>

    <span>HTML</span>
    <span>CSS</span>
    <span>JavaScript</span>
</body>
</html>
