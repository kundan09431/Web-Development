<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display</title>
</head>
<style>
    h1{
        display: none;
    }
    ul{
        border: 1px solid black;
        width: 500px;
    }
    li{
        border: 1px solid gray;
        display: inline;
    }
</style>
<body>
    <h1>CSS Display</h1>
    <ul>
        <li>List item 1</li>
        <li>List item 2</li>
        <li>List item 3</li>
        <li>List item 4</li>
        <li>List item 5</li>
    </ul>
</body>
</html>
