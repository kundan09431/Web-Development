<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML</title>
</head>
<body>
    <!--Heading Tags-->
    <h1>This is the Main Heading</h1>
	<h2>This is a Subheading</h2>
	<h3>This is a Smaller Subheading</h3>
	<h4>This is a Sub-Subheading</h4>
	<h5>This is a Minor Subheading</h5>
	<h6>This is the Smallest Heading</h6>
    <!--Paragraph Tag-->
    <p>
        This paragraph has multiple lines.
        But HTML reduces<br/> them to a single line,
        <!--br tag- using break the line-->
        <hr/><!--using hr tag draw horizontal line-->
        omitting the carriage return we have used.
    </p>
    <!--Using link tage-->
    <a href="#">Google</a>
    <hr/>
    <!--using img tag-->
    <img src="./IMG_20260316_171355.jpg" alt="photo" width="500px" height="400px" />
</body>
</html>
