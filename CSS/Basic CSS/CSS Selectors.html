<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selectors</title>
</head>
<style>
    #para1{
        color: aqua;
        text-align: center;
    }
    .center{
        text-align: center;
        color: aquamarine;
    }
    p.center{
        text-align: right;
        color: black;
    }
</style>
<body>
    <h1 class="center">Welcome Kundan</h1>
    <p id="para1">Hello World!</p>
    <p class="center">This paragraph is not affected by the style.</p>
</body>
</html>
