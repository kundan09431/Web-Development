<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline</title>
    <style>
        li{
            display: inline;
        }
        div{
            display: inline;
        }
    </style>
</head>
<body>
    <p>Display a list of links as a horizontal menu:</p>
    <ul>
        <li><a href="#">HTML</a></li>
        <li><a href="#">CSS</a></li>
        <li><a href="#">JavaScript</a></li>
    </ul>
    <div>1</div>
    <div>2</div>
    <div>3</div>
</body>
</html>
