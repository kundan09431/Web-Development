<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation iterations count</title>
    <style>
        div{
            background-color: red;
            width: 100px;
            height: 100px;
            position: relative;
            animation-name: example;
            animation-duration: 5s;
            animation-iteration-count: 3;
            animation-direction: alternate-reverse;
        }
        @keyframes example{
            0%{background-color: red; left: 0px; top: 0px;}
            25%{background-color: yellow; left: 500px; top: 0px;}
            50%{background-color: blue; left: 500px; top: 500px;}
            75%{background-color: green; left: 0px; top: 500px;}
            100%{background-color: red; left: 0px; top: 0px;}
        }
    </style>
</head>
<body>
    <h1>CSS Animation</h1>

<p>The animation-iteration-count property specifies the number of times an animation should run. The following example will run the animation 3 times before it stops:</p>

<div></div>
</body>
</html>
