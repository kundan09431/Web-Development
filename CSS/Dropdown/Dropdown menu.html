<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Menu</title>
</head>
<style>
    .second{
        background-color: #4CAF50;
        color: white;
        padding: 16px;
        font-size: 16px;
        border: none;
        cursor: pointer;
    }
    .first{
        display: inline-block;
        position: relative;
    }
    .third {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 150px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}
.third a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

.third a:hover {
    background-color: #f1f1f1
}

.first:hover .third {
  display: block;
}

.first:hover .second {
  background-color: #3e8e41;
}
</style>
<body>
    <h2>Dropdown Menu</h2>
<p>Move the mouse over the button to open the dropdown menu.</p>

<div class="first">
  <button class="second">Dropdown</button>
  <div class="third">
  <a href="#">Link 1</a>
  <a href="#">Link 2</a>
  <a href="#">Link 3</a>
  </div>
</div>

<p><strong>Note:</strong> We use href="#" for test links. In a real web site this would be URLs.</p>
</body>
</html>
